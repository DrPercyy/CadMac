<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CadMac</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

</head>


<body>


    <div class="container-fluid p-4">


        <div class="header mb-4">

            <h1>
                CadMac
            </h1>

            <span>
                Gerenciador de MACs
            </span>

        </div>




        <div class="row g-3">


            <!-- =========================
             PESQUISA
        ========================== -->

            <div class="col-md-5">


                <div class="card">


                    <div class="card-header">

                        Pesquisa

                    </div>


                    <div class="card-body">


                        <textarea id="macInput" class="form-control" rows="15"
                            placeholder="Cole os MACs aqui..."></textarea>


                    </div>


                </div>



            </div>





            <!-- =========================
             RESULTADO
        ========================== -->


            <div class="col-md-7">


                <div class="card">


                    <div class="card-header">

                        Resultado

                    </div>


                    <div class="card-body result-box">


                        <div id="resultado" class="resultado-texto">

                        </div>


                    </div>


                </div>


            </div>



        </div>





        <!-- =========================
         LOG
    ========================== -->


        <div class="card mt-3">


            <div class="card-header">

                Log

            </div>


            <div class="card-body log" id="log">


                Aguardando...


            </div>


        </div>






        <!-- =========================
         BOTÕES
    ========================== -->


        <div class="buttons mt-3">


            <button class="btn btn-primary" onclick="pesquisar()">

                Pesquisar

            </button>



            <button class="btn btn-secondary" onclick="limpar()">

                Limpar

            </button>



            <label class="btn btn-success">


                Atualizar Base


                <input type="file" hidden id="baseFile" accept=".xls,.xlsx" onchange="enviarBase()">


            </label>



            <button class="btn btn-warning" onclick="document.getElementById('txtFile').click()">

                Importar TXT


            </button>


            <input type="file" id="txtFile" hidden accept=".txt" onchange="lerTXT(event)">




            <button class="btn btn-dark" disabled>

                OCR (em breve)

            </button>



        </div>





        <!-- =========================
         STATUS BASE
    ========================== -->


        <div class="mt-4">


            <small id="statusBase">

                Base carregando...

            </small>


        </div>



    </div>





    <script src="/static/script.js"></script>


</body>

</html>
